name: Decode App and Extract Code

on:
  push:
    paths:
      - 'a.zip'
  workflow_dispatch:

jobs:
  decompile-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # এখানে v4 করা হয়েছে

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # এখানে v4 করা হয়েছে
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Install JADX
        run: |
          wget https://github.com/skylot/jadx/releases/download/v1.4.7/jadx-1.4.7.zip
          unzip jadx-1.4.7.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: Decompile a.zip
        run: |
          echo "Decoding files..."
          ./jadx/bin/jadx -d decompiled_app a.zip

      - name: Create acode.txt with Formatted Code
        run: |
          touch acode.txt
          echo "Merging all code files into acode.txt..."
          
          find decompiled_app -type f \( -name "*.java" -o -name "*.xml" -o -name "*.kt" -o -name "*.json" -o -name "*.txt" \) | while read -r filepath; do
            filename=$(basename "$filepath")
            
            echo "################" >> acode.txt
            echo "Filename:- $filename" >> acode.txt
            echo "filepath:- $filepath" >> acode.txt
            echo "Code:- " >> acode.txt
            cat "$filepath" >> acode.txt
            echo -e "\n##################\n" >> acode.txt
          done

      - name: Upload acode.txt as Artifact
        uses: actions/upload-artifact@v4 # মূল এররটি এখান থেকেই আসছিল, এটি v4 করা হয়েছে
        with:
          name: Extracted-Code-acode
          path: acode.txt
          
